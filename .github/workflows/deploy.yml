name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: booking-system/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: booking-system

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: booking-system

      - name: Build Next.js
        run: npm run build
        working-directory: booking-system
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Prepare Standalone Build
        run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next/static
          cp -r .next/static .next/standalone/.next/static
        working-directory: booking-system

      - name: Zip Standalone Build
        run: zip -r deploy.zip .
        working-directory: booking-system/.next/standalone

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fmc-booking-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: booking-system/.next/standalone/deploy.zip
